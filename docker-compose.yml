version: '3.9'

services:
  replitai:
    build: .
    container_name: replitai-bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_USERNAME=${GITHUB_USERNAME}
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./replitai.db}
      - WEBAPP_URL=${WEBAPP_URL:-}
      - WEBAPP_PORT=8080
      - ADMIN_IDS=${ADMIN_IDS:-}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./sandbox:/app/sandbox
      - ./uploads:/app/uploads
      - ./chroma_db:/app/chroma_db
      - replitai_db:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: replitai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: replitai
      POSTGRES_USER: replitai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replitai_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  replitai_db:
  postgres_data:
